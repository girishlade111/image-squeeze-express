      (function(){
        try {
          var OLD_KEY = 'imagesqueeze-theme';
          var NEW_KEY = 'ls-image-compressor-theme';
          var old = localStorage.getItem(OLD_KEY);
          if (old !== null && localStorage.getItem(NEW_KEY) === null) {
            localStorage.setItem(NEW_KEY, old);
            localStorage.removeItem(OLD_KEY);
          }
          var t = localStorage.getItem(NEW_KEY);
          var dark = t ? t === 'dark' : true;
          document.documentElement.classList.toggle('dark', dark);
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <script type="application/ld+json">
    {

          "acceptedAnswer": {

            "text": "Yes. Every tool runs 100% in your browser — image compression, PDF re-rendering, and file renaming all happen on your device. Your files are never uploaded to a server."

            "@type": "Answer",

        {
          "@type": "Question",
          "name": "How does PDF compression work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Each page of your PDF is rasterized into a JPEG and rebuilt into a new PDF, fully in your browser. Three presets control the size/quality trade-off: Strong, Balanced, and Light. Text in the output is not selectable because pages become full-page images."
          }
        },
        {
          "@type": "Question",
          "name": "How many files can I process at once?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Up to 50 images per batch (750 MB total), up to 5 PDFs per batch (100 MB each), and up to 100 files per rename batch (200 MB each)."

        {
          "@type": "Question",
          "name": "Why use WebP or AVIF instead of JPEG?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "At the same visual quality, WebP is typically 25-35% smaller than JPEG and AVIF is 40-50% smaller. Both are supported by every modern browser, so the savings translate to faster page loads and lower bandwidth."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to create an account? Is it really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No account, no sign-up, no email, no watermarks, no hidden fees. Every tool is fully free and unlimited apart from the per-batch caps documented above."
          }
        }
      ]
    }
    </script>
